name: config-debug-env
version: "1.0.0"
description: >
  Real-world configuration file debugging environment for AI agent training.
  An agent is given a broken config file and must fix all bugs in it.
author: "A2K Team"
tags:
  - openenv
  - devops
  - configuration
  - debugging

tasks:
  - id: task1_json
    description: "Fix bugs in a broken JSON application config file"
    difficulty: easy
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task2_yaml
    description: "Fix bugs in a broken YAML service config file"
    difficulty: easy
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task3_dockerfile
    description: "Fix bugs in a broken Dockerfile"
    difficulty: medium
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task4_compose
    description: "Fix bugs in a broken docker-compose.yml"
    difficulty: medium
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task5_k8s
    description: "Fix bugs in a broken Kubernetes deployment manifest"
    difficulty: hard
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task6_github_actions
    description: "Fix bugs in a broken GitHub Actions workflow"
    difficulty: hard
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task7_nginx
    description: "Fix bugs in a broken nginx reverse proxy config"
    difficulty: very_hard
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"

observation_space:
  broken_config: "string - the broken configuration file to fix"
  file_type: "string - json|yaml|dockerfile|compose|k8s|github_actions|nginx"
  error_message: "string - error message describing the bugs"
  task_id: "string - task identifier"
  task_description: "string - what the config should do"
  difficulty: "string - easy|medium|hard|very_hard"
  num_bugs: "int - number of bugs to fix"

action_space:
  fixed_config: "string (required) - your fixed configuration file"

reward:
  type: continuous
  range: "(0.0, 1.0)"
  shaping:
    - "partial credit per bug fixed"
    - "score = bugs_fixed / total_bugs"

endpoints:
  - path: /reset
    method: POST
  - path: /step
    method: POST
  - path: /state
    method: GET
  - path: /tasks
    method: GET
  - path: /grader
    method: POST
  - path: /baseline
    method: GET

runtime:
  framework: FastAPI
  python: "3.11"
  docker: true
  hf_spaces: true
